# Virtual host configuration for roderbuilt.com

server {
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/roderbuiltconstruction.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/roderbuiltconstruction.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    server_name roderbuiltconstruction.com; # Define domain names for this server block

    # strapi admin panel
    location /cms/ {
        proxy_pass http://localhost:1337/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass_request_headers on;
    }

    # Serve static files from a root directory
    location / {
        root /var/www/html/roderbuilt; # Document root for the website
        index index.html index.htm; # Default files to serve
        try_files $uri $uri/ =404; # Try to serve file, then directory, then return 404
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

server {
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.roderbuilt.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.roderbuilt.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    server_name www.roderbuilt.com; # Define domain names for this server block
    return 301 https://roderbuiltconstruction.com$request_uri;
}

